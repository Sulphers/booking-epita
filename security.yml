name: security

on:
  workflow_dispatch

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  dependencies:
    name: dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5        
        with:
          scan-args: |-
            --format sarif
            --output DependenciesAnalysisFull.sarif
            ./
        continue-on-error: true

      - name: Upload OSV SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: DependenciesAnalysisFull.sarif

  source-code-analysis:
    name: source-code-analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output SemgrepAnalysisFull.sarif
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: SemgrepAnalysisFull.sarif 
